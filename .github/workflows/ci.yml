name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Frontend tests (vitest)
        run: bun run test

      - name: Production build
        run: bun run build

  engine:
    name: Deno engine + regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run engine + regression + calibration tests
        run: |
          deno test \
            --allow-net --allow-env --allow-read --no-check \
            supabase/functions/tests/ \
            supabase/functions/get-model-b-analysis/score-anchor.test.ts \
            supabase/functions/process-scan/process-scan.test.ts
